<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayneWorks3D</title>
    <link rel="stylesheet" href="WayneWorks3D.css">
</head>

<body>

    <header class="barra-de-navegacion-superior">
        <div class="seccion-izquierda-navegacion">
            <div class="grupo-menus-desplegables-izquierdo">

                <div class="contenedor-menu-desplegable">
                    <button class="boton-abrir-menu">@</button>
                    <div class="caja-enlaces-ocultos">
                        <a href="URL_INSTAGRAM" target="_blank" class="enlace-menu-item">
                            <img src="" alt="Logo Instagram" class="icono-red-social">
                            <span>Instagram</span>
                        </a>
                        <a href="URL_MAKERWORLD" target="_blank" class="enlace-menu-item">
                            <img src="" alt="Logo MakerWorld" class="icono-red-social">
                            <span>MakerWorld</span>
                        </a>
                        <a href="URL_FACEBOOK" target="_blank" class="enlace-menu-item">
                            <img src="" alt="Logo Facebook" class="icono-red-social">
                            <span>Facebook</span>
                        </a>
                    </div>
                </div>

                <div class="contenedor-menu-desplegable">
                    <button class="boton-abrir-menu">Secciones</button>
                    <div class="caja-enlaces-ocultos">
                        <a href="pagina1.html" class="enlace-menu-item">Página 1</a>
                        <a href="pagina2.html" class="enlace-menu-item">Página 2</a>
                        <a href="pagina3.html" class="enlace-menu-item">Página 3</a>
                    </div>
                </div>

            </div>
        </div>
        <div class="seccion-central-logo">
            <h2>WayneWorks3D</h2>
        </div>

        <div class="seccion-derecha-login">
            <a href="#login" class="enlace-iniciar-sesion">Login</a>
        </div>
    </header>

    <main class="area-contenido-principal">

        <section class="contenedor-global-noticias">


            <div class="fila-noticia-destacada-completa">
                <article class="tarjeta-individual-noticia">
                    <div class="caja-imagen-noticia-destacada">
                        <img src="ruta-imagen-destacada.jpg" alt="Noticia importante">
                        <span class="etiqueta-categoria-noticia">Destacado</span>
                    </div>
                    <div class="caja-textos-noticia">
                        <span class="fecha-publicacion-noticia">25 de Marzo, 2026</span>
                        <h3>Noticia Principal</h3>
                        <p class="parrafo-descripcion-noticia">Prueba noticia especial 1</p>
                    </div>
                </article>
            </div>
            <div class="fila-dos-columnas-noticias">

                <article class="tarjeta-individual-noticia">
                    <div class="caja-imagen-noticia">
                        <img src="ruta-imagen-1.jpg" alt="Impresión 3D">
                        <span class="etiqueta-categoria-noticia">Materiales</span>
                    </div>
                    <div class="caja-textos-noticia">
                        <span class="fecha-publicacion-noticia">24 de Marzo, 2026</span>
                        <h3>Noticia normal 1</h3>
                        <p class="parrafo-descripcion-noticia">Prueba noticia normal 1</p>
                    </div>
                </article>

                <article class="tarjeta-individual-noticia">
                    <div class="caja-imagen-noticia">
                        <img src="ruta-imagen-2.jpg" alt="Modelo 3D">
                        <span class="etiqueta-categoria-noticia">Modelado 3D</span>
                    </div>
                    <div class="caja-textos-noticia">
                        <span class="fecha-publicacion-noticia">20 de Marzo, 2026</span>
                        <h3>Noticia normal 2</h3>
                        <p class="parrafo-descripcion-noticia">Prueba de noticia 2.</p>
                    </div>
                </article>

            </div>

        </section>

    </main>

</body>

</html>
